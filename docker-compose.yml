version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: chronosync
      POSTGRES_PASSWORD: chronosync
      POSTGRES_DB: chronosync
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronosync"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://chronosync:chronosync@db:5432/chronosync
      SECRET_KEY: change-me
    ports:
      - "8000:8000"

volumes:
  db_data:
